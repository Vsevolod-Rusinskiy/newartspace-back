name: Master CI/CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - master

jobs:
  prettier-lint-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Prettier check
        run: yarn prettier-check

      - name: Run Lint check
        run: yarn lint

  deploy:
    needs: prettier-lint-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            set -e

            echo "=== SSH DEPLOY START ==="
            echo "Date: $(date)"
            echo "User: $(whoami)"
            echo "Host: $(hostname)"
            echo "Uptime: $(uptime || true)"
            echo "Workdir: $(pwd)"

            echo "=== Scripts directory ==="
            ls -la /var/www/newartspace/scripts

            echo "=== Running deploy.sh ==="
            cd /var/www/newartspace/scripts
            ./deploy.sh

            echo "=== Containers status (top) ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | sed -n '1,30p'

            echo "=== SSH DEPLOY END ==="
            echo "Date: $(date)"
